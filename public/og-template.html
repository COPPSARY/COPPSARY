<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Template - Coppsary Solutions</title>
  <style>
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      display: grid;
      place-items: center;
      font-family: "Hanken Grotesk", sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #3B82F6 100%);
      color: #F8FAFC;
    }
    .card {
      width: 920px;
      border: 1px solid rgba(248, 250, 252, 0.2);
      border-radius: 24px;
      padding: 56px;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 72px;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      font-size: 30px;
      color: #94A3B8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Coppsary Solutions</h1>
    <p>Digital trust platform for Khmer business growth</p>
  </div>
</body>
</html>
