          - generic [ref=e56]: (02) Journey
          - paragraph [ref=e58]: AUREA did not begin as a finished agency. It began as a search.
        - generic [ref=e59]:
          - article [ref=e60]:
            - generic [ref=e61]: "01"
            - generic [ref=e62]:
              - heading "COPPSARY" [level=3] [ref=e63]
              - paragraph [ref=e64]: COPPSARY was the starting point — where the team explored creative concepts, early product thinking, and the first version of what building digital experiences together could look like.
          - article [ref=e65]:
            - generic [ref=e66]: "02"
            - generic [ref=e67]:
              - heading "Turing Hackathon" [level=3] [ref=e68]
              - paragraph [ref=e69]: The hackathon sharpened execution. It pushed ideas into real time, pressure-tested decisions, and made it clear that speed only matters when the result still feels trustworthy.
          - article [ref=e70]:
            - generic [ref=e71]: "03"
            - generic [ref=e72]:
              - heading "ACTSmart Incubation" [level=3] [ref=e73]
              - paragraph [ref=e74]: "Incubation added structure. It brought the team closer to real business needs: positioning, clarity, operational reality, and platforms that support growth instead of just looking polished."
          - article [ref=e75]:
            - generic [ref=e76]: "04"
            - generic [ref=e77]:
              - heading "What we learned" [level=3] [ref=e78]
              - paragraph [ref=e79]: Most businesses do not only need a better website. They need a stronger digital identity, cleaner systems, and a platform layer that helps them move forward with more confidence.
      - generic [ref=e80]:
        - article [ref=e81]:
          - generic [ref=e82]: (03) Insight
          - heading "Too many businesses still look less credible online than they are in real life. A weak digital presence quietly erodes trust before a conversation even begins." [level=2] [ref=e84]
        - article [ref=e85]:
          - generic [ref=e86]: (04) Insight
          - 'heading "We kept seeing the same issue: ambitious brands with strong ideas were being represented by outdated websites, fragmented systems, and digital identities that did not match their potential." [level=2] [ref=e88]'
        - article [ref=e89]:
          - generic [ref=e90]: (05) Insight
          - heading "Modern businesses need platforms that feel fast, clear, and professional. When the digital layer is weak, growth slows, trust drops, and opportunities leak out at the edges." [level=2] [ref=e92]
      - generic [ref=e93]:
